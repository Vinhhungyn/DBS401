version: '3.8'
services:
  # ============================================================
  # DB cho bên VULNERABLE (5000) - giữ password plaintext để demo SQLi
  # ============================================================
  mysql-vulnerable:
    image: mysql:8.0
    container_name: mysql_vuln
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: company_db
    ports:
      - "3307:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
      - mysql_log:/var/log/mysql
    command: >
      --general-log=1
      --general-log-file=/var/log/mysql/general.log
      --secure-file-priv=""
    networks:
      - dbnet

  # ============================================================
  # DB cho bên PATCHED (5001) - password bcrypt hash, tách riêng
  # FIX: tách DB riêng để 2 side độc lập, không ảnh hưởng nhau
  # ============================================================
  mysql-patched:
    image: mysql:8.0
    container_name: mysql_patched
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: company_db_patched
    ports:
      - "3308:3306"
    volumes:
      - ./sql/init_patched.sql:/docker-entrypoint-initdb.d/init_patched.sql
      - mysql_patched_data:/var/lib/mysql
      - mysql_log:/var/log/mysql
    command: >
      --general-log=1
      --general-log-file=/var/log/mysql/general.log
      --secure-file-priv=""
    networks:
      - dbnet

  webapp-vulnerable:
    build: ./webapp-php
    volumes:
      - ./webapp-php:/var/www/html
      - apache_vuln_log:/var/log/apache2
    container_name: webapp_vuln
    restart: always
    ports:
      - "5000:80"
    environment:
      DB_HOST: mysql_vuln
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASS: app123
    depends_on:
      - mysql-vulnerable
    networks:
      - dbnet

  webapp-protected:
    build: ./webapp-php-patched
    volumes:
      - ./webapp-php-patched:/var/www/html
      - apache_log:/var/log/apache2
    container_name: webapp_protected
    restart: always
    ports:
      - "5001:80"
    environment:
      # FIX: trỏ sang mysql-patched thay vì proxysql, dùng DB riêng
      DB_HOST: mysql-patched
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASS: app123
    depends_on:
      - mysql-patched
    networks:
      - dbnet

  proxysql:
    image: proxysql/proxysql:2.5.5
    container_name: proxysql
    restart: always
    ports:
      - "6033:6033"
      - "6032:6032"
    volumes:
      - ./proxysql/proxysql.cnf:/etc/proxysql.cnf
      - proxysql_log:/var/lib/proxysql
    depends_on:
      - mysql-vulnerable
    networks:
      - dbnet

  log-dashboard:
    build: ./log-dashboard
    container_name: log_dashboard
    restart: always
    ports:
      - "5002:80"
    volumes:
      - mysql_log:/var/log/mysql:ro
      - proxysql_log:/var/log/proxysql:ro
      - apache_log:/var/log/apache2:ro
      - apache_vuln_log:/var/log/apache2_vuln:ro
    depends_on:
      - mysql-vulnerable
      - proxysql
      - webapp-protected
    networks:
      - dbnet

volumes:
  apache_vuln_log:
  mysql_data:
  mysql_patched_data:
  mysql_log:
  proxysql_log:
  apache_log:

networks:
  dbnet:
    driver: bridge
