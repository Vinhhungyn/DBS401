# ============================================================
# rule-cookie.conf - Chong Cookie Tampering & Session Attack
# Covers: Cookie tampering, session fixation, cookie injection,
#         forged values, privilege escalation via cookie,
#         session hijacking, CSRF
# ============================================================

# Rule 4001: Chan cookie role co gia tri khong hop le
# Chi cho phep: user, admin, manager, guest
SecRule REQUEST_COOKIES:role "@rx ^(?!user$|admin$|manager$|guest$).+" \
    "id:4001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: Invalid role value - tampering detected',\
    logdata:'Cookie role: %{MATCHED_VAR}'"

# Rule 4002: Chan cookie injection qua newline
# Covers: %0d%0a injection in cookie values
SecRule REQUEST_COOKIES "@rx (?:%0d|%0a|\r|\n)" \
    "id:4002,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: CRLF injection in cookie',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4003: Chan cookie co gia tri SQL injection
SecRule REQUEST_COOKIES "@rx (?i)(?:union[\s]+select|or[\s]+1[\s]*=[\s]*1|drop[\s]+table|insert[\s]+into)" \
    "id:4003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: SQL injection attempt in cookie',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4004: Chan cookie co gia tri XSS
SecRule REQUEST_COOKIES "@rx (?i)(?:<script|javascript:|onerror=|onload=|alert\s*\(|document\.cookie)" \
    "id:4004,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: XSS attempt in cookie value',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4005: Chan session fixation
# Attacker sets PHPSESSID via GET/POST to fix session
SecRule ARGS_NAMES "@rx ^(?:PHPSESSID|JSESSIONID|ASPSESSIONID|session_id)$" \
    "id:4005,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: Session fixation attempt - session ID in params',\
    logdata:'Param: %{MATCHED_VAR_NAME}'"

# Rule 4006: Chan cookie co gia tri qua dai (buffer overflow attempt)
SecRule REQUEST_COOKIES "@rx ^.{4096,}$" \
    "id:4006,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: Oversized cookie value - possible buffer overflow',\
    logdata:'Length exceeded'"

# Rule 4007: Chan cookie co ky tu dac biet nguy hiem
# Covers: null bytes, control characters
SecRule REQUEST_COOKIES "@rx (?:%00|\x00|\x01|\x02|\x03|\x04|\x05|\x1f)" \
    "id:4007,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: Null byte or control character in cookie',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4008: Chan truy cap admin khi cookie role = user
# User khong duoc truy cap cac trang admin
SecRule REQUEST_URI "@rx ^/(?:sysconfig|admin|manage|dashboard)\.php" \
    "id:4008,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    chain,\
    msg:'Cookie: Unauthorized admin page access with user role'"
    SecRule REQUEST_COOKIES:role "@rx ^(?:user|guest)$" \
        "t:none"

# Rule 4009: Chan path traversal qua cookie
SecRule REQUEST_COOKIES "@rx (?:\.\./|\.\.\\\\|%2e%2e)" \
    "id:4009,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Cookie: Path traversal in cookie value',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4010: Log canh bao khi co cookie role=admin kem theo request POST
# Phat hien privilege escalation attempt
SecRule REQUEST_METHOD "@rx ^POST$" \
    "id:4010,\
    phase:1,\
    pass,\
    log,\
    chain,\
    msg:'Cookie: Admin POST request - logging for audit'"
    SecRule REQUEST_COOKIES:role "@rx ^admin$" \
        "t:none"