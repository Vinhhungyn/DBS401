# ============================================================
# rule-cookie.conf - Chong Cookie Tampering & Session Attack
# ============================================================

# Rule 4001: Chan cookie role co gia tri khong hop le
# Fix: them ký tự rỗng vào pattern, dùng t:lowercase
SecRule REQUEST_COOKIES:role "!@rx ^(?:user|admin|manager|guest)$" \
    "id:4001,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:lowercase,\
    log,\
    msg:'Cookie: Invalid role value - tampering detected',\
    logdata:'Cookie role: %{MATCHED_VAR}',\
    chain"
    SecRule REQUEST_COOKIES:role "@rx .+" \
        "t:none"

# Rule 4002: Chan cookie injection qua newline (CRLF)
SecRule REQUEST_COOKIES "@rx (?:%0d|%0a|\r|\n)" \
    "id:4002,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,\
    log,\
    msg:'Cookie: CRLF injection in cookie',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4003: Chan SQLi trong cookie - mo rong hon rule cu
# Fix: dung libinjection thay vi regex don gian
SecRule REQUEST_COOKIES "@detectSQLi" \
    "id:4003,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'Cookie: SQL injection attempt detected via libinjection',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4004: Chan XSS trong cookie
SecRule REQUEST_COOKIES "@rx (?i)(?:<script|javascript:|onerror\s*=|onload\s*=|alert\s*\(|document\.cookie|<iframe|<svg)" \
    "id:4004,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'Cookie: XSS attempt in cookie value',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4005: Chan session fixation qua GET/POST param
SecRule ARGS_NAMES "@rx ^(?:PHPSESSID|JSESSIONID|ASPSESSIONID|session_id)$" \
    "id:4005,\
    phase:2,\
    deny,\
    status:403,\
    t:none,\
    log,\
    msg:'Cookie: Session fixation attempt - session ID in params',\
    logdata:'Param: %{MATCHED_VAR_NAME}'"

# Rule 4006: Chan cookie qua dai
SecRule REQUEST_COOKIES "@rx ^.{4096,}$" \
    "id:4006,\
    phase:1,\
    deny,\
    status:403,\
    t:none,\
    log,\
    msg:'Cookie: Oversized cookie value - possible buffer overflow',\
    logdata:'Length exceeded'"

# Rule 4007: Chan null byte / control char trong cookie
SecRule REQUEST_COOKIES "@rx (?:%00|\x00|\x01|\x1f)" \
    "id:4007,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,\
    log,\
    msg:'Cookie: Null byte or control character in cookie',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4008: Chan truy cap trang admin khi KHONG co cookie hop le
# Fix: chặn khi không có role admin/manager (thay vì chặn user)
SecRule REQUEST_URI "@rx ^/(?:sysconfig|admin|manage|dashboard)\.php" \
    "id:4008,\
    phase:1,\
    deny,\
    status:403,\
    t:none,\
    log,\
    chain,\
    msg:'Cookie: Unauthorized admin page access - missing admin role'"
    SecRule REQUEST_COOKIES:role "!@rx ^(?:admin|manager)$" \
        "t:none,t:lowercase"

# Rule 4009: Chan path traversal trong cookie
SecRule REQUEST_COOKIES "@rx (?:\.\./|\.\.\\\\|%2e%2e)" \
    "id:4009,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,\
    log,\
    msg:'Cookie: Path traversal in cookie value',\
    logdata:'Cookie: %{MATCHED_VAR}'"

# Rule 4010: Log audit POST request tu admin/manager
SecRule REQUEST_METHOD "@rx ^POST$" \
    "id:4010,\
    phase:1,\
    pass,\
    log,\
    chain,\
    msg:'Cookie: Admin POST request - audit log'"
    SecRule REQUEST_COOKIES:role "@rx ^(?:admin|manager)$" \
        "t:none,t:lowercase"

# Rule 4011: Chan admin/manager role khi khong co PHPSESSID
# Fix: logic chinh xac, them t:none dung cho ca 2 condition
SecRule REQUEST_COOKIES:role "@rx ^(?:admin|manager)$" \
    "id:4011,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:lowercase,\
    log,\
    chain,\
    msg:'Cookie: Privilege escalation - admin role without valid session'"
    SecRule &REQUEST_COOKIES:PHPSESSID "@eq 0" \
        "t:none"