# ============================================================
# rule-login.conf - Chan truy cap /login.php khi da dang nhap
# ============================================================

# Rule 9060: Block /login.php khi cookie logged_in=1
SecRule REQUEST_URI "@rx ^/login\.php" \
    "id:9060, \
    phase:1, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'Login page: Access denied - user already logged in'"
    SecRule REQUEST_COOKIES:logged_in "@streq 1" \
        "t:none"