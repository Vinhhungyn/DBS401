# ============================================================
# modsecurity.conf - Cau hinh co ban ModSecurity WAF
# FIX: thay deny,status:403 bang redirect ve error403.php
# De PHP hien thong bao loi tu nhien theo tung chuc nang
# ============================================================

SecRuleEngine On

SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecResponseBodyAccess Off

SecAuditEngine RelevantOnly
SecAuditLog /var/log/apache2/modsec_audit.log
SecAuditLogType Serial
SecAuditLogParts ABIJDEFHZ

SecDebugLog /var/log/apache2/modsec_debug.log
SecDebugLogLevel 0

# FIX: thay vi tra 403 thang, redirect ve error403.php
# error403.php se doc HTTP_REFERER roi redirect ve trang goc kem ?waf_block=1
SecDefaultAction "phase:2,log,auditlog,redirect:/error403.php"

Include /etc/modsecurity/rules/rule-sql.conf
Include /etc/modsecurity/rules/rule-fileupload.conf
Include /etc/modsecurity/rules/rule-misconfig.conf
Include /etc/modsecurity/rules/rule-cookie.conf
Include /etc/modsecurity/rules/rule-xss.conf
Include /etc/modsecurity/rules/rule-jwt.conf
