# ============================================================
# rule-xss.conf - Chong Cross-Site Scripting (XSS)
# Covers: Reflected XSS, Stored XSS, DOM XSS,
#         Script injection, Event handler injection,
#         HTML injection, JavaScript URI
# ============================================================

# Rule 5001: Chan script tag injection
SecRule ARGS|REQUEST_URI "@rx (?i)(?:<script[\s\S]*?>|<\/script>)" \
    "id:5001,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Script tag injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5002: Chan JavaScript URI
SecRule ARGS|REQUEST_URI "@rx (?i)javascript\s*:" \
    "id:5002,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: JavaScript URI detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5003: Chan event handler injection
SecRule ARGS "@rx (?i)on(?:load|error|click|mouse|focus|blur|change|submit|key|input|drag|drop|scroll|resize|unload|beforeunload|hashchange|popstate|message|storage|online|offline|visibilitychange)\s*=" \
    "id:5003,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: Event handler injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5004: Chan iframe injection
SecRule ARGS "@rx (?i)<iframe[\s\S]*?>" \
    "id:5004,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Iframe injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5005: Chan HTML tag injection voi attribute nguy hiem
SecRule ARGS "@rx (?i)<(?:img|svg|body|object|embed|link|meta|form|input|button|details|dialog)[^>]*(?:src|href|action|formaction|data|xlink:href)\s*=\s*['\"]?\s*(?:javascript|vbscript|data):" \
    "id:5005,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Dangerous HTML attribute injection',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5006: Chan expression() CSS injection (IE)
SecRule ARGS "@rx (?i)(?:expression\s*\(|behavior\s*:|binding\s*:)" \
    "id:5006,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: CSS expression injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5007: Chan SVG XSS
SecRule ARGS "@rx (?i)<svg[\s\S]*?(?:onload|onerror|onclick)" \
    "id:5007,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: SVG XSS detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5008: Chan template injection / Angular XSS
SecRule ARGS "@rx (?:\{\{.*?\}\}|\$\{.*?\})" \
    "id:5008,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: Template injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5009: Chan encoding bypass XSS
SecRule ARGS "@rx (?i)(?:&#x?[0-9a-f]+;.*?(?:script|javascript|onerror|onload)|%3[Cc]script)" \
    "id:5009,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Encoding bypass attempt detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5010: Chan XSS qua Referer va User-Agent header
SecRule REQUEST_HEADERS:Referer|REQUEST_HEADERS:User-Agent "@rx (?i)(?:<script|javascript:|onerror\s*=|onload\s*=)" \
    "id:5010,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: XSS attempt in HTTP headers',\
    logdata:'Header: %{MATCHED_VAR}'"