# ============================================================
# rule-xss.conf - Chong Cross-Site Scripting (XSS)
# ============================================================

# Rule 5001: Chan script tag injection
# Fix: them REQUEST_COOKIES
SecRule ARGS|REQUEST_URI|REQUEST_COOKIES "@rx (?i)(?:<script[\s\S]*?>|<\/script>)" \
    "id:5001,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Script tag injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5002: Chan JavaScript URI
# Fix: them REQUEST_COOKIES
SecRule ARGS|REQUEST_URI|REQUEST_COOKIES "@rx (?i)javascript\s*:" \
    "id:5002,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: JavaScript URI detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5003: Chan event handler injection
# Fix: them REQUEST_URI, REQUEST_COOKIES
SecRule ARGS|REQUEST_URI|REQUEST_COOKIES "@rx (?i)on(?:load|error|click|mouse(?:over|out|move|enter|leave)|focus|blur|change|submit|key(?:down|up|press)|input|drag|drop|scroll|resize|unload|beforeunload|hashchange|popstate|message|storage|online|offline|visibilitychange)\s*=" \
    "id:5003,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: Event handler injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5004: Chan iframe injection
SecRule ARGS|REQUEST_COOKIES "@rx (?i)<iframe[\s\S]*?>" \
    "id:5004,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Iframe injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5005: Chan HTML tag injection voi attribute nguy hiem
SecRule ARGS|REQUEST_COOKIES "@rx (?i)<(?:img|svg|body|object|embed|link|meta|form|input|button|details|dialog)[^>]*(?:src|href|action|formaction|data|xlink:href)\s*=\s*['\"]?\s*(?:javascript|vbscript|data):" \
    "id:5005,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Dangerous HTML attribute injection',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5006: Chan expression() CSS injection
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:expression\s*\(|behavior\s*:|binding\s*:)" \
    "id:5006,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: CSS expression injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5007: Chan SVG XSS
SecRule ARGS|REQUEST_COOKIES "@rx (?i)<svg[\s\S]*?(?:onload|onerror|onclick)" \
    "id:5007,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: SVG XSS detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5008: Chan template injection
# Fix: them context cu the hon, tranh false positive
SecRule ARGS "@rx (?i)(?:\{\{[\s]*['\"]?(?:constructor|__proto__|prototype|eval|alert|document|window)|#\{.*(?:eval|exec|system)\})" \
    "id:5008,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: Template/SSTI injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5009: Chan encoding bypass XSS
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:&#x?[0-9a-f]+;.*?(?:script|javascript|onerror|onload)|%3[Cc]script)" \
    "id:5009,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'XSS: Encoding bypass attempt detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 5010: Chan XSS trong Referer va User-Agent
SecRule REQUEST_HEADERS:Referer|REQUEST_HEADERS:User-Agent "@rx (?i)(?:<script|javascript:|onerror\s*=|onload\s*=|<iframe|<svg)" \
    "id:5010,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: XSS attempt in HTTP headers',\
    logdata:'Header: %{MATCHED_VAR}'"

# Rule 5011: Chan DOM-based XSS qua hash fragment trong Referer
# Payload kieu: #<img src=x onerror=alert(1)>
SecRule REQUEST_HEADERS:Referer "@rx (?i)#.*(?:<|%3c).*(?:script|onerror|onload|javascript)" \
    "id:5011,\
    phase:1,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'XSS: DOM-based XSS attempt via Referer hash',\
    logdata:'Header: %{MATCHED_VAR}'"