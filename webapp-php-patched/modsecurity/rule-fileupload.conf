# Rule 9043: /profile.php chi cho phep upload anh (jpg, jpeg, png, gif, webp)
# Chi ap dung khi POST va co file upload
SecRule REQUEST_URI "@rx ^/profile\.php" \
    "id:9043, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /profile.php: Only jpg/jpeg/png/gif/webp allowed'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES_NAMES "!@rx (?i)\.(jpg|jpeg|png|gif|webp)$" \
            "t:none,t:urlDecodeUni,t:lowercase"

# Rule 9044: /upload.php chi cho phep jpg, jpeg, png
# Rule 9044: /upload.php chi cho phep tai lieu (pdf, doc, docx, xls, xlsx, jpg, jpeg, png)
SecRule REQUEST_URI "@rx ^/upload\.php" \
    "id:9044, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /upload.php: Only pdf/doc/docx/xls/xlsx/jpg/jpeg/png allowed'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES_NAMES "!@rx (?i)\.(pdf|doc|docx|xls|xlsx|jpg|jpeg|png)$" \
            "t:none,t:urlDecodeUni,t:lowercase"