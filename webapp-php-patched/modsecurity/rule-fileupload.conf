# ============================================================
# rule-fileupload.conf - Chan upload file nguy hiem tren /profile.php va /upload.php (5001)
# Dung dung bien FILES (ten file that client gui len)
# FILES_NAMES la ten FIELD trong form (vd "avatar") - KHONG PHAI ten file
#   -> dung sai bien nay khien rule cu luon deny het moi POST co file, bat ke dung/sai dinh dang
# Kem lop 2: chan double-extension / bien the script (vd shell.php.jpg, shell.phtml)
# ============================================================

# --- /profile.php: chi cho phep anh (jpg, jpeg, png, gif, webp) ---

# Rule 9043: whitelist extension o cuoi ten file
SecRule REQUEST_URI "@rx ^/profile\.php" \
    "id:9043, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /profile.php: Only jpg/jpeg/png/gif/webp allowed'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES "!@rx (?i)\.(jpg|jpeg|png|gif|webp)$" \
            "t:none,t:removeNulls,t:urlDecodeUni,t:lowercase"

# Rule 9045: chan double-extension / duoi file nguy hiem xuat hien bat ky dau trong ten file
SecRule REQUEST_URI "@rx ^/profile\.php" \
    "id:9045, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /profile.php: Dangerous extension detected in filename (double-extension bypass)'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES "@rx (?i)\.(php[0-9]*|phtml|pht|phar|cgi|pl|py|sh|asp|aspx|jsp|exe|dll|so)(\.|$)" \
            "t:none,t:removeNulls,t:urlDecodeUni,t:lowercase"

# --- /upload.php: chi cho phep tai lieu (pdf, doc, docx, xls, xlsx, jpg, jpeg, png) ---

# Rule 9044: whitelist extension o cuoi ten file
SecRule REQUEST_URI "@rx ^/upload\.php" \
    "id:9044, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /upload.php: Only pdf/doc/docx/jpg/jpeg/png allowed'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES "!@rx (?i)\.(pdf|doc|docx|jpg|jpeg|png)$" \
            "t:none,t:removeNulls,t:urlDecodeUni,t:lowercase"

# Rule 9046: chan double-extension / duoi file nguy hiem xuat hien bat ky dau trong ten file
SecRule REQUEST_URI "@rx ^/upload\.php" \
    "id:9046, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload /upload.php: Dangerous extension detected in filename (double-extension bypass)'"
    SecRule REQUEST_METHOD "@streq POST" \
        "chain"
        SecRule FILES "@rx (?i)\.(php[0-9]*|phtml|pht|phar|cgi|pl|py|sh|asp|aspx|jsp|exe|dll|so)(\.|$)" \
            "t:none,t:removeNulls,t:urlDecodeUni,t:lowercase"