# ============================================================
# Custom File Upload Security Rules
# Target: POST /profile/image/file
# Covers: Webshell upload, MIME spoofing, dangerous extensions,
#         double extension bypass, null byte injection
# ============================================================

# Rule 9040: Block dangerous file extensions in upload
# Covers: .php, .phtml, .php5, .asp, .aspx, .jsp, .py, .sh, .bat, .exe, .cgi
SecRule FILES_NAMES "@rx (?i)\.(php\d*|phtml|phar|asp|aspx|jsp|jspx|py|rb|sh|bash|bat|exe|cgi|pl|cgi|shtml|htaccess|htpasswd|config|env|xml|svg)$" \
    "id:9040, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:lowercase, \
    log, \
    msg:'File Upload: Dangerous file extension blocked', \
    logdata:'Filename: %{MATCHED_VAR}'"

# Rule 9041: Block double extension bypass
# Covers: shell.php.jpg, malware.asp.png
SecRule FILES_NAMES "@rx (?i)\.(php\d*|phtml|phar|asp|aspx|jsp|py|sh|bat|exe)\.(jpg|jpeg|png|gif|webp|bmp|svg|pdf|zip)$" \
    "id:9041, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:lowercase, \
    log, \
    msg:'File Upload: Double extension bypass attempt', \
    logdata:'Filename: %{MATCHED_VAR}'"

# Rule 9042: Block null byte injection in filename
# Covers: shell.php%00.jpg, shell.php\x00.png
SecRule FILES_NAMES "@rx (?:%00|\x00)" \
    "id:9042, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni, \
    log, \
    msg:'File Upload: Null byte injection in filename', \
    logdata:'Filename: %{MATCHED_VAR}'"

# Rule 9043: Enforce only image MIME types on upload endpoint
# Reject upload if Content-Type in multipart part is not image/*
SecRule REQUEST_URI "@rx ^/profile\.php" \
    "id:9043, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload: Only image/* MIME type allowed'"
    SecRule MULTIPART_PART_HEADERS:file "!@rx Content-Type:[\s]*image/(jpeg|png|gif|webp|bmp|svg\+xml)" \
        "t:none,t:lowercase"

# Rule 9044: Block MIME type mismatch (Content-Type spoofing)
# Reject if Content-Type in multipart is not image/*
SecRule REQUEST_URI "@rx ^/profile\.php" \
    "id:9044, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    chain, \
    msg:'File Upload: MIME type spoofing detected - non-image content-type'"
    SecRule MULTIPART_PART_HEADERS:file "@rx Content-Type:[\s]*(text|application|audio|video|chemical|model|x-world)/(?!svg\+xml)" \
        "t:none,t:lowercase"

# Rule 9045: Detect PHP/script content in uploaded file body
# Catches webshells even if renamed to .jpg
SecRule REQUEST_BODY "@rx (?i)(?:<\?php|<\?=|<asp:|<%@|<%=|<script[\s]*language[\s]*=[\s]*['\"]?vb|eval[\s]*\(|system[\s]*\(|exec[\s]*\(|passthru[\s]*\(|shell_exec[\s]*\(|popen[\s]*\(|proc_open[\s]*\(|base64_decode[\s]*\(|gzinflate[\s]*\(|str_rot13[\s]*\()" \
    "id:9045, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:htmlEntityDecode, \
    log, \
    msg:'File Upload: Webshell/script code detected in upload body', \
    logdata:'Matched: %{MATCHED_VAR}'"

# Rule 9046: Block oversized filenames (path traversal long name)
SecRule FILES_NAMES "@rx ^.{256,}$" \
    "id:9046, \
    phase:2, \
    deny, \
    status:403, \
    t:none, \
    log, \
    msg:'File Upload: Filename too long (possible path traversal)', \
    logdata:'Filename length exceeded'"

# Rule 9047: Path traversal in filename
# Covers: ../../../etc/passwd, ..%2F, ..%5C
SecRule FILES_NAMES "@rx (?:\.\./|\.\.\\\\|%2e%2e%2f|%2e%2e/|\.\.%2f|%2e%2e%5c)" \
    "id:9047, \
    phase:2, \
    deny, \
    status:403, \
    t:none,t:urlDecodeUni,t:lowercase, \
    log, \
    msg:'File Upload: Path traversal in filename', \
    logdata:'Filename: %{MATCHED_VAR}'"