# Rule 3001: Chan truy cap sysconfig.php khi khong phai admin
# Fix: dung chain, chi cho phep admin vao
SecRule REQUEST_URI "@rx ^/sysconfig\.php$" \
    "id:3001,\
    phase:1,\
    deny,\
    status:403,\
    t:none,\
    log,\
    chain,\
    msg:'Misconfig: Unauthorized access to sysconfig.php'"
    SecRule REQUEST_COOKIES:role "!@rx ^admin$" \
        "t:none,t:lowercase"

# Rule 3007: Chan PHP wrapper abuse
# Fix: mo rong them stdin, expect, zip, glob, compress
# Rule 3007: Chan PHP wrapper abuse
SecRule ARGS|REQUEST_URI "@rx (?i)(?:php:\/\/(?:input|filter|data|expect|stdin|stdout|stderr|memory|temp)|expect:\/\/|zip:\/\/|glob:\/\/|compress\.(?:zlib|bzip2):\/\/|phar:\/\/|data:(?:text|application))" \
    "id:3007,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'Misconfig: PHP wrapper abuse attempt',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 3008: Chan script trong /uploads/
SecRule REQUEST_URI "@rx ^/uploads/.*\.(?:php\d*|phtml|phar|asp|aspx|jsp)" \
    "id:3008,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Script execution in uploads blocked'"