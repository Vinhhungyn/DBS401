# ============================================================
# rule-misconfig.conf - Chong Misconfiguration
# Covers: Unauthorized access, sensitive file exposure,
#         directory traversal, server info leakage,
#         debug mode exposure, backup file access
# ============================================================

# Rule 3001: Chan truy cap sysconfig.php khi khong phai admin
SecRule REQUEST_URI "@rx ^/sysconfig\.php" \
    "id:3001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    chain,\
    msg:'Misconfig: Unauthorized access to sysconfig.php'"
    SecRule REQUEST_COOKIES:role "!@rx ^admin$" \
        "t:none"

# Rule 3002: Chan truy cap cac file cau hinh nhay cam
# Covers: .env, .git, config.php, web.config, .htaccess, .htpasswd
SecRule REQUEST_URI "@rx (?i)(?:\.env$|\.git(?:/|$)|web\.config$|\.htaccess$|\.htpasswd$|phpinfo\.php$|adminer\.php$|phpmyadmin)" \
    "id:3002,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Sensitive file access blocked',\
    logdata:'URI: %{REQUEST_URI}'"

# Rule 3003: Chan truy cap file backup
# Covers: .bak, .sql, .zip, .tar.gz, .old, .swp
SecRule REQUEST_URI "@rx (?i)\.(bak|sql|zip|tar\.gz|tar|gz|7z|rar|old|orig|swp|tmp|log)$" \
    "id:3003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Backup/temp file access blocked',\
    logdata:'URI: %{REQUEST_URI}'"

# Rule 3004: Chan path traversal trong URL
# Covers: ../../etc/passwd, ..%2F, %2e%2e%2f
SecRule REQUEST_URI "@rx (?:\.\.\/|\.\.\\|%2e%2e%2f|%2e%2e\/|\.\.%2f|%2e%2e%5c|%252e%252e)" \
    "id:3004,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Path traversal in URL',\
    logdata:'URI: %{REQUEST_URI}'"

# Rule 3005: Chan path traversal trong GET/POST params
SecRule ARGS "@rx (?:\.\.\/|\.\.\\\\|%2e%2e%2f|%2e%2e\/|\.\.%2f|%2e%2e%5c)" \
    "id:3005,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Path traversal in parameters',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 3006: Chan truy cap thu muc he thong
# Covers: /etc/passwd, /etc/shadow, /proc/self, /var/log
SecRule REQUEST_URI "@rx (?i)(?:\/etc\/(?:passwd|shadow|hosts|issue|group|sudoers)|\/proc\/self|\/var\/log|\/windows\/win\.ini|\/winnt\/win\.ini)" \
    "id:3006,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: System file access attempt',\
    logdata:'URI: %{REQUEST_URI}'"

# Rule 3007: Chan lo thong tin qua error message
# Block PHP error display trigger attempts
SecRule ARGS "@rx (?i)(?:\/dev\/null|\/dev\/random|php:\/\/(?:input|filter|data|expect))" \
    "id:3007,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: PHP wrapper abuse attempt',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 3008: Chan truy cap thu muc uploads truc tiep voi file PHP
# Prevent executing uploaded files directly
SecRule REQUEST_URI "@rx ^/uploads/.*\.(?:php\d*|phtml|phar|asp|aspx|jsp)" \
    "id:3008,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: Direct execution of uploaded script blocked',\
    logdata:'URI: %{REQUEST_URI}'"

# Rule 3009: Chan HTTP method nguy hiem
# Block TRACE, TRACK (used for XST attacks)
SecRule REQUEST_METHOD "@rx ^(?:TRACE|TRACK)$" \
    "id:3009,\
    phase:1,\
    deny,\
    status:405,\
    log,\
    msg:'Misconfig: Dangerous HTTP method blocked',\
    logdata:'Method: %{REQUEST_METHOD}'"

# Rule 3010: Chan Header Injection
# Covers: CRLF injection in headers
SecRule REQUEST_URI|ARGS "@rx (?:%0d%0a|%0a%0d|\r\n|\n\r|\r|\n)(?:content-type|location|set-cookie)" \
    "id:3010,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Misconfig: HTTP header injection attempt',\
    logdata:'Payload: %{MATCHED_VAR}'"