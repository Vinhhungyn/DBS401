# ============================================================
# rule-sql.conf - Custom SQL Injection Detection Rules
# Covers: Classic, Boolean, UNION, Time-based, Error-based,
#         Stacked queries, Comment bypass, Encoding bypass,
#         Cookie/Header injection, REQUEST_URI injection
# ============================================================

# Rule 9020: libinjection engine - catch-all SQLi fingerprint
# Mo rong: scan them ARGS_NAMES, REQUEST_COOKIES, REQUEST_URI
SecRule ARGS|ARGS_NAMES|REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_URI "@detectSQLi" \
    "id:9020,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'SQLi detected via libinjection',\
    logdata:'Param: %{MATCHED_VAR_NAME} | Payload: %{MATCHED_VAR}'"

# Rule 9021: UNION-based SQLi
# Mo rong: them REQUEST_COOKIES, REQUEST_URI
SecRule ARGS|REQUEST_COOKIES|REQUEST_URI "@rx (?i)union[\s\S]{0,20}select" \
    "id:9021,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeWhitespace,t:removeNulls,\
    log,\
    msg:'SQLi: UNION SELECT detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9022: Boolean-based SQLi
# Mo rong: them REQUEST_COOKIES
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:'[\s]*(?:or|and|not|xor)[\s]*(?:'|[\d])|[\s]+(?:or|and)[\s]+[\d]+=[\d]+|[\s]+(?:or|and)[\s]+'[^']*'='[^']*'|[\s]+(?:or|and)[\s]+true|[\s]+(?:or|and)[\s]+false)" \
    "id:9022,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Boolean bypass detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9023: Time-based blind SQLi
# Mo rong: them REQUEST_COOKIES, REQUEST_HEADERS
SecRule ARGS|REQUEST_COOKIES|REQUEST_HEADERS "@rx (?i)(?:sleep[\s]*\([\s]*[\d]+|waitfor[\s]+delay[\s]*'|benchmark[\s]*\([\s]*[\d]+|pg_sleep[\s]*\(|dbms_pipe\.receive_message)" \
    "id:9023,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Time-based blind injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9024: Error-based SQLi
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:extractvalue[\s]*\(|updatexml[\s]*\(|exp[\s]*\([\s]*~|floor[\s]*\([\s]*rand|geometrycollection[\s]*\([\s]*null|polygon[\s]*\([\s]*null|multipoint[\s]*\([\s]*null|linestring[\s]*\()" \
    "id:9024,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Error-based injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9025: Stacked queries / Batch SQLi
SecRule ARGS|REQUEST_COOKIES "@rx (?i);[\s]*(?:drop[\s]+(?:table|database|index)|insert[\s]+into|update[\s]+\w+[\s]+set|delete[\s]+from|exec(?:ute)?[\s]*(?:\(|[\s]+\w+))" \
    "id:9025,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Stacked query detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9026: SQL Comment injection
# Mo rong: them REQUEST_COOKIES, REQUEST_URI
SecRule ARGS|REQUEST_COOKIES|REQUEST_URI "@rx (?i)(?:--[\s\r\n]|--$|#[\s\r\n]|\/\*[\s\S]*?\*\/|\/\*![0-9]*)" \
    "id:9026,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: SQL comment injection detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9027: Information gathering SQLi
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:information_schema|sys\.(?:tables|columns|databases)|xp_cmdshell|load_file[\s]*\(|into[\s]+(?:dumpfile|outfile)|from[\s]+(?:dual|information_schema))" \
    "id:9027,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Information gathering attempt detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9028: Hex/Char encoding bypass
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:0x[0-9a-f]{4,}|char[\s]*\([\s]*[\d]+|unhex[\s]*\(|0x[0-9a-f]+[\s]*(?:or|and|union))" \
    "id:9028,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Hex/Char encoding bypass detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9029: Out-of-band SQLi
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:load_file[\s]*\([\s]*['\"][\s]*\/\/|into[\s]+outfile[\s]*['\"]\/\/|utl_http|utl_file|dbms_ldap)" \
    "id:9029,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Out-of-band exfiltration attempt detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9030: SQLi qua User-Agent / Referer / X-Forwarded-For
# Header injection - thuong bi bo qua nhung hay gap trong bug bounty
SecRule REQUEST_HEADERS:User-Agent|REQUEST_HEADERS:Referer|REQUEST_HEADERS:X-Forwarded-For "@detectSQLi" \
    "id:9030,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'SQLi detected in HTTP Header via libinjection',\
    logdata:'Header: %{MATCHED_VAR_NAME} | Payload: %{MATCHED_VAR}'"

# Rule 9031: SQLi qua REQUEST_BODY (raw body - bat POST JSON/XML)
# Bat cac payload gui qua Content-Type: application/json
SecRule REQUEST_BODY "@detectSQLi" \
    "id:9031,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:htmlEntityDecode,t:removeNulls,\
    log,\
    msg:'SQLi detected in raw REQUEST_BODY',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9032: WAF Bypass - whitespace thay bang comment /* */
# Payload kieu: UNION/**/SELECT hoac AND/**/1=1
SecRule ARGS|REQUEST_COOKIES "@rx (?i)(?:union\/\*.*?\*\/select|and\/\*.*?\*\/[\d]+=[\d]+|or\/\*.*?\*\/[\d]+=[\d]+)" \
    "id:9032,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Comment-based whitespace bypass detected',\
    logdata:'Payload: %{MATCHED_VAR}'"

# Rule 9033: Second-order SQLi pattern - INSERT/UPDATE voi ky tu dac biet
# Bat payload duoc luu vao DB roi moi thuc thi
SecRule ARGS "@rx (?i)(?:(?:insert|update|replace)[\s]+(?:into|[\w`]+)[\s\S]*?(?:select|union|0x|char\())" \
    "id:9033,\
    phase:2,\
    deny,\
    status:403,\
    t:none,t:urlDecodeUni,t:removeNulls,\
    log,\
    msg:'SQLi: Second-order injection pattern in INSERT/UPDATE',\
    logdata:'Payload: %{MATCHED_VAR}'"